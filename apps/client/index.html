<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>호랑이 생신 잔치 — zodiac-clue</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, "Apple SD Gothic Neo", sans-serif;
        background: #16130f;
        color: #f0e9dc;
      }
      .hidden { display: none !important; }
      button {
        background: #b4622b; color: #fff; border: 0; border-radius: 6px;
        padding: 8px 12px; font-size: 13px; cursor: pointer;
      }
      button:hover { background: #c9733a; }
      button:disabled { background: #45403a; color: #8c8578; cursor: not-allowed; }
      input {
        background: #16130f; color: #f0e9dc; border: 1px solid #4a3d2b;
        border-radius: 6px; padding: 8px 10px; font-size: 13px;
      }
      h1 { color: #f0d9a8; }

      /* ── 랜딩 / 로비 공통 카드 ── */
      .center { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
      .card {
        width: 340px; background: #211c16; border: 1px solid #3a3126;
        border-radius: 12px; padding: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.4);
      }
      .card h1 { font-size: 20px; margin: 0 0 4px; }
      .card .subtitle { font-size: 12px; color: #a89778; margin: 0 0 20px; }
      .field { margin-bottom: 12px; }
      .field label { display: block; font-size: 12px; color: #a89778; margin-bottom: 4px; }
      .field input { width: 100%; }
      .full { width: 100%; margin-top: 4px; }
      .char-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 4px; }
      .char {
        display: flex; flex-direction: column; align-items: center; gap: 3px;
        padding: 8px 2px; background: #16130f; border: 1px solid #3a3126;
        border-radius: 8px; cursor: pointer; font-size: 10px; color: #cbbfa8;
        text-align: center;
      }
      .char .em { font-size: 20px; line-height: 1; }
      .char:hover { border-color: #b4622b; }
      .char.selected { border-color: #e0a35a; background: #2c2317; color: #f0d9a8; }
      .char.locked { opacity: 0.35; cursor: not-allowed; }
      .persona {
        margin-top: 8px; font-size: 12px; color: #cbbfa8; line-height: 1.5;
        background: #16130f; border: 1px solid #3a3126; border-radius: 8px;
        padding: 8px 10px; min-height: 40px;
      }
      .persona b { color: #f0d9a8; }
      .divider { text-align: center; color: #6b6355; font-size: 11px; margin: 16px 0; }
      .join-row { display: flex; gap: 8px; }
      .join-row input { flex: 1; }
      .msg { font-size: 12px; color: #e0a35a; margin-top: 12px; min-height: 16px; }

      /* ── 로비(대기실) ── */
      .invite { display: flex; gap: 8px; margin-bottom: 16px; }
      .invite input { flex: 1; font-size: 11px; }
      #playerList { list-style: none; padding: 0; margin: 8px 0 16px; }
      #playerList li {
        padding: 8px 10px; background: #16130f; border: 1px solid #2c251c;
        border-radius: 6px; margin-bottom: 6px; font-size: 13px;
      }
      .host-hint { font-size: 12px; color: #a89778; margin-top: 10px; text-align: center; }

      /* ── 게임 화면 (풀스크린 + 플로팅 HUD) ── */
      #gameScreen { position: fixed; inset: 0; }
      #game { position: absolute; inset: 0; width: 100vw; height: 100vh; line-height: 0; }
      .hud {
        position: fixed; z-index: 5;
        background: rgba(13, 11, 8, 0.82); border: 1px solid #3a3126;
        border-radius: 10px; padding: 10px 12px;
        box-shadow: 0 6px 24px rgba(0, 0, 0, 0.5); backdrop-filter: blur(3px);
        font-size: 12px; color: #f0e9dc;
      }
      .hud h3 { margin: 0 0 8px; font-size: 11px; color: #f0d9a8; letter-spacing: 0.4px; }
      .hud summary {
        cursor: pointer; list-style: none; font-size: 11px;
        color: #f0d9a8; letter-spacing: 0.4px; outline: none;
      }
      .hud summary::-webkit-details-marker { display: none; }
      .hud summary::before { content: "▾ "; color: #a89778; }
      .hud details:not([open]) summary::before { content: "▸ "; }
      .hud details[open] summary { margin-bottom: 8px; }
      .hud-ctrl { left: 16px; top: 16px; display: flex; gap: 8px; padding: 8px; }
      .hud-hand { left: 16px; bottom: 16px; max-width: 300px; }
      #hand { min-height: 18px; }
      .hud-evi { right: 16px; top: 16px; width: 216px; max-height: 66vh; overflow-y: auto; }
      .hud-log { right: 16px; bottom: 16px; width: 244px; }
      #log { height: 168px; overflow-y: auto; }
      #log > div { padding: 2px 0; border-bottom: 1px solid #2c251c; }
      .hud-help {
        left: 50%; bottom: 12px; transform: translateX(-50%);
        color: #cbbfa8; font-size: 11px; padding: 6px 14px; white-space: nowrap;
      }
      kbd {
        background: #2c2519; border: 1px solid #4a3d2b; border-bottom-width: 2px;
        border-radius: 5px; padding: 1px 6px; font-size: 11px; color: #f0d9a8;
      }
      /* 증거 노트 (개인 메모) */
      .evi-group { margin-bottom: 8px; }
      .evi-group .cat { font-size: 10px; color: #a89778; margin-bottom: 4px; }
      .evi-chips { display: flex; flex-wrap: wrap; gap: 4px; }
      .evi-chip {
        display: inline-flex; align-items: center; gap: 3px;
        padding: 3px 6px; border-radius: 6px; cursor: pointer;
        background: #16130f; border: 1px solid #3a3126;
        font-size: 11px; color: #cbbfa8; user-select: none;
      }
      .evi-chip:hover { border-color: #b4622b; }
      .evi-chip.cleared { opacity: 0.4; text-decoration: line-through; }
      .evi-chip.suspect { background: #3a2b1a; border-color: #e0a35a; color: #f0d9a8; }

      /* 반응형: 좁은 화면에서 HUD 축소·모서리 정리 */
      @media (max-width: 680px) {
        .hud { font-size: 11px; padding: 8px 10px; }
        .hud-ctrl { left: 8px; top: 8px; gap: 6px; padding: 6px; }
        .hud-ctrl button { padding: 6px 8px; }
        .hud-hand { left: 8px; bottom: 8px; max-width: 46vw; }
        .hud-evi { right: 8px; top: 8px; width: 46vw; max-height: 40vh; }
        .hud-log { right: 8px; bottom: 8px; width: 46vw; }
        #log { height: 84px; }
        .hud-help { display: none; }
      }
      @media (max-width: 420px) {
        .hud-hand, .hud-evi, .hud-log { max-width: 92vw; width: auto; }
        .hud-hand { right: 8px; }
      }

      /* ── 카드 선택 모달 ── */
      .overlay {
        position: fixed; inset: 0; background: rgba(0, 0, 0, 0.6);
        display: flex; align-items: center; justify-content: center; z-index: 10;
      }
      .modal {
        background: #221c15; border: 1px solid #4a3d2b; border-radius: 10px;
        padding: 20px; width: 300px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      }
      .modal h2 { font-size: 15px; margin: 0 0 14px; color: #f0d9a8; }
      .modal-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
      .modal-row label { width: 52px; font-size: 12px; color: #a89778; }
      .modal select {
        flex: 1; background: #16130f; color: #f0e9dc; border: 1px solid #4a3d2b;
        border-radius: 6px; padding: 6px 8px; font-size: 13px;
      }
      .modal .actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
      .modal .ghost { background: #3a3126; }
      .modal .ghost:hover { background: #493d2d; }
    </style>
  </head>
  <body>
    <!-- ① 랜딩 -->
    <section id="landing" class="center">
      <div class="card">
        <h1>🐯 호랑이 생신 잔치</h1>
        <p class="subtitle">대감집 손님들 중 잔치 선물을 훔친 자를 추리하라</p>
        <div class="field">
          <label>캐릭터 선택 (선택 사항 · 대기실에서 변경 가능)</label>
          <div id="charGrid" class="char-grid"></div>
        </div>
        <div id="personaPanel" class="persona">
          캐릭터에 마우스를 올리면 <b>성격</b>이 표시됩니다. 이 성격은 NPC 대사에도 반영돼요.
        </div>
        <button id="createBtn" class="full">방 만들기</button>
        <div class="divider">— 또는 초대받았다면 —</div>
        <div class="join-row">
          <input id="codeInput" placeholder="초대 코드" />
          <button id="joinBtn">참가</button>
        </div>
        <div id="landingMsg" class="msg"></div>
      </div>
    </section>

    <!-- ② 대기실(로비) -->
    <section id="lobby" class="center hidden">
      <div class="card">
        <h1>🏮 대기실</h1>
        <p class="subtitle">초대 링크를 친구에게 공유하세요</p>
        <div class="invite">
          <input id="inviteLink" readonly />
          <button id="copyBtn">복사</button>
        </div>
        <div style="font-size: 12px; color: #a89778;">
          참가자 (<span id="playerCount">0</span>/6)
        </div>
        <ul id="playerList"></ul>
        <div style="font-size: 12px; color: #a89778; margin-bottom: 4px;">
          내 캐릭터 (선택됨 🟡 / 사용중 🔒)
        </div>
        <div id="lobbyChars" class="char-grid" style="margin-bottom: 16px;"></div>
        <button id="startBtn" class="full" disabled>잔치 시작</button>
        <div id="hostHint" class="host-hint"></div>
      </div>
    </section>

    <!-- ③ 게임 (풀스크린 보드 + 플로팅 HUD) -->
    <section id="gameScreen" class="hidden">
      <div id="game"></div>

      <div class="hud hud-ctrl">
        <button id="suggest">제안</button>
        <button id="accuse">고발</button>
        <button id="endTurn">턴 종료</button>
      </div>

      <div class="hud hud-evi">
        <details open>
          <summary>🔍 증거 노트 (나만 봄)</summary>
          <div id="evidence"></div>
        </details>
      </div>

      <div class="hud hud-hand">
        <div id="hand"><b>내 단서 패</b>: (잔치 시작 후 표시)</div>
      </div>

      <div class="hud hud-log">
        <details open>
          <summary>📜 기록 / 알림</summary>
          <div id="log"></div>
        </details>
      </div>

      <div class="hud hud-help">
        이동 <kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> · 줌 <kbd>휠</kbd> · 자유시점 <kbd>Space</kbd>(꾹) · 방에서 [제안]
      </div>
    </section>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
