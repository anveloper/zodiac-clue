<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>호랑이 생신 잔치 — zodiac-clue</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, "Apple SD Gothic Neo", sans-serif;
        background: #16130f;
        color: #f0e9dc;
      }
      .hidden { display: none !important; }
      button {
        background: #b4622b; color: #fff; border: 0; border-radius: 6px;
        padding: 8px 12px; font-size: 13px; cursor: pointer;
      }
      button:hover { background: #c9733a; }
      button:disabled { background: #45403a; color: #8c8578; cursor: not-allowed; }
      input {
        background: #16130f; color: #f0e9dc; border: 1px solid #4a3d2b;
        border-radius: 6px; padding: 8px 10px; font-size: 13px;
      }
      h1 { color: #f0d9a8; }

      /* ── 랜딩 / 로비 공통 카드 ── */
      .center { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
      .card {
        width: 340px; background: #211c16; border: 1px solid #3a3126;
        border-radius: 12px; padding: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.4);
      }
      .card h1 { font-size: 20px; margin: 0 0 4px; }
      .card .subtitle { font-size: 12px; color: #a89778; margin: 0 0 20px; }
      .field { margin-bottom: 12px; }
      .field label { display: block; font-size: 12px; color: #a89778; margin-bottom: 4px; }
      .field input { width: 100%; }
      .full { width: 100%; margin-top: 4px; }
      .char-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 4px; }
      .char {
        display: flex; flex-direction: column; align-items: center; gap: 3px;
        padding: 8px 2px; background: #16130f; border: 1px solid #3a3126;
        border-radius: 8px; cursor: pointer; font-size: 10px; color: #cbbfa8;
        text-align: center;
      }
      .char .em { font-size: 20px; line-height: 1; }
      .char:hover { border-color: #b4622b; }
      .char.selected { border-color: #e0a35a; background: #2c2317; color: #f0d9a8; }
      .char.locked { opacity: 0.35; cursor: not-allowed; }
      .persona {
        margin-top: 8px; font-size: 12px; color: #cbbfa8; line-height: 1.5;
        background: #16130f; border: 1px solid #3a3126; border-radius: 8px;
        padding: 8px 10px; min-height: 40px;
      }
      .persona b { color: #f0d9a8; }
      .divider { text-align: center; color: #6b6355; font-size: 11px; margin: 16px 0; }
      .join-row { display: flex; gap: 8px; }
      .join-row input { flex: 1; }
      .msg { font-size: 12px; color: #e0a35a; margin-top: 12px; min-height: 16px; }

      /* ── 로비(대기실) ── */
      .invite { display: flex; gap: 8px; margin-bottom: 16px; }
      .invite input { flex: 1; font-size: 11px; }
      #playerList { list-style: none; padding: 0; margin: 8px 0 16px; }
      #playerList li {
        padding: 8px 10px; background: #16130f; border: 1px solid #2c251c;
        border-radius: 6px; margin-bottom: 6px; font-size: 13px;
      }
      .host-hint { font-size: 12px; color: #a89778; margin-top: 10px; text-align: center; }

      /* ── 게임 화면 (풀스크린 + 플로팅 HUD) ── */
      #gameScreen { position: fixed; inset: 0; }
      #game { position: absolute; inset: 0; width: 100vw; height: 100vh; line-height: 0; }
      .hud {
        position: fixed; z-index: 5;
        background: rgba(13, 11, 8, 0.82); border: 1px solid #3a3126;
        border-radius: 10px; padding: 10px 12px;
        box-shadow: 0 6px 24px rgba(0, 0, 0, 0.5); backdrop-filter: blur(3px);
        font-size: 12px; color: #f0e9dc;
      }
      .hud h3 { margin: 0 0 8px; font-size: 11px; color: #f0d9a8; letter-spacing: 0.4px; }
      .hud summary {
        cursor: pointer; list-style: none; font-size: 11px;
        color: #f0d9a8; letter-spacing: 0.4px; outline: none;
      }
      .hud summary::-webkit-details-marker { display: none; }
      .hud summary::before { content: "▾ "; color: #a89778; }
      .hud details:not([open]) summary::before { content: "▸ "; }
      .hud details[open] summary { margin-bottom: 8px; }
      .hud-ctrl { left: 16px; top: 16px; display: flex; gap: 8px; padding: 8px; }
      .hud-turn {
        left: 50%; top: 14px; transform: translateX(-50%);
        color: #cbbfa8; font-size: 13px; padding: 7px 16px; white-space: nowrap;
      }
      .hud-turn.mine {
        color: #16130f; background: #e0a35a; border-color: #e0a35a; font-weight: 600;
      }
      .hud-spectate {
        left: 50%; top: 56px; transform: translateX(-50%);
        display: flex; gap: 10px; align-items: center; color: #e0736b; font-weight: 600;
      }
      .hud-spectate button { padding: 4px 10px; }
      /* 종료 결과 오버레이 */
      .end-overlay {
        position: fixed; inset: 0; z-index: 40;
        display: flex; align-items: center; justify-content: center;
        background: rgba(0, 0, 0, 0.55);
      }
      .end-card {
        background: #211c16; border: 2px solid #e0a35a; border-radius: 16px;
        padding: 32px 44px; text-align: center; box-shadow: 0 16px 60px rgba(0, 0, 0, 0.7);
      }
      .end-title { font-size: 26px; color: #f0d9a8; font-weight: 700; }
      .end-sub { font-size: 14px; color: #a89778; margin: 10px 0 20px; }
      .end-btn { padding: 10px 22px; font-size: 14px; }
      /* 화면 중앙 주사위 오버레이 */
      .dice-overlay {
        position: fixed; inset: 0; z-index: 30; pointer-events: none;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
      }
      .dice-overlay .dice-card {
        background: rgba(13, 11, 8, 0.92); border: 2px solid #e0a35a;
        border-radius: 20px; padding: 28px 48px; text-align: center;
        box-shadow: 0 16px 60px rgba(0, 0, 0, 0.7);
        transition: transform 0.2s ease-out, border-color 0.2s;
      }
      .dice-overlay.done .dice-card { transform: scale(1.12); border-color: #ffd479; }
      .dice-overlay .dice-faces { font-size: 76px; line-height: 1.1; letter-spacing: 6px; }
      .dice-overlay .dice-label { font-size: 24px; color: #f0d9a8; margin-top: 12px; font-weight: 700; letter-spacing: 1px; }
      .dice-overlay.done .dice-label { color: #ffd479; }
      .hud-hand { left: 16px; bottom: 16px; max-width: 300px; }
      #hand { min-height: 18px; }
      /* ── 우측 컬럼 (바닥부터 재구현) ── */
      .rp-col {
        position: fixed; top: 16px; right: 16px; bottom: 16px;
        width: 260px; z-index: 5;
        display: flex; flex-direction: column; gap: 8px;
        pointer-events: none;
      }
      .rp-col > * { pointer-events: auto; }
      .rp-panel {
        background: rgba(13, 11, 8, 0.85); border: 1px solid #3a3126;
        border-radius: 10px; box-shadow: 0 6px 24px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(3px);
        display: flex; flex-direction: column; min-height: 0; overflow: hidden;
      }
      .rp-head {
        flex: none; padding: 8px 12px; font-size: 11px; color: #f0d9a8;
        letter-spacing: 0.4px; border-bottom: 1px solid #2c251c;
      }
      .rp-head .rp-sub { color: #a89778; font-weight: 400; }
      .rp-body { flex: 1; min-height: 0; overflow-y: auto; padding: 8px 12px; }
      .rp-evi { flex: none; height: 260px; }   /* 높이 드래그로 조절 */
      .rp-log { flex: 1 1 0; }                  /* 남은 공간 채우고 내부 스크롤 */

      /* 드래그 핸들 — 잡을 수 있음이 보이도록 강조색(주황) + 그립 */
      .rp-hresizer {
        flex: none; height: 14px; cursor: row-resize; border-radius: 7px;
        display: flex; align-items: center; justify-content: center;
        background: rgba(180, 98, 43, 0.18);
      }
      .rp-hresizer::before {
        content: ""; width: 52px; height: 6px; border-radius: 3px;
        background: #b4622b; box-shadow: 0 0 0 1px #e0a35a inset;
      }
      .rp-hresizer:hover { background: rgba(180, 98, 43, 0.32); }
      .rp-hresizer:hover::before { background: #e0a35a; }
      /* 너비 조절 핸들(컬럼 좌측 모서리) */
      .rp-wresizer {
        position: absolute; left: -8px; top: 0; bottom: 0; width: 16px; border-radius: 8px;
        cursor: col-resize; display: flex; align-items: center; justify-content: center;
        background: rgba(180, 98, 43, 0.18);
      }
      .rp-wresizer::before {
        content: ""; width: 6px; height: 56px; border-radius: 3px;
        background: #b4622b; box-shadow: 0 0 0 1px #e0a35a inset;
      }
      .rp-wresizer:hover { background: rgba(180, 98, 43, 0.32); }
      .rp-wresizer:hover::before { background: #e0a35a; }

      /* 스크롤바 톤 통일 */
      * { scrollbar-width: thin; scrollbar-color: #4a3d2b #16130f; }
      ::-webkit-scrollbar { width: 9px; height: 9px; }
      ::-webkit-scrollbar-track { background: #16130f; border-radius: 5px; }
      ::-webkit-scrollbar-thumb { background: #4a3d2b; border-radius: 5px; border: 2px solid #16130f; }
      ::-webkit-scrollbar-thumb:hover { background: #6b5838; }
      #log > div {
        padding: 3px 6px; border-bottom: 1px solid #2c251c;
        border-left: 3px solid transparent; border-radius: 3px; margin-bottom: 2px;
      }
      /* 로그 종류별 배경/좌측 강조 */
      .log-suggest { background: #1f2b3a; border-left-color: #5b9bd5 !important; }
      .log-disprove { background: #2b1f3a; border-left-color: #a878d5 !important; }
      .log-accuse { background: #3a1f1f; border-left-color: #d56b6b !important; }
      .log-win { background: #1f3a24; border-left-color: #6be08a !important; }
      .log-move { background: #26221a; border-left-color: #8c8578 !important; }
      .log-info { background: transparent; }
      .log-badge {
        display: inline-block; margin-left: 6px; padding: 0 5px; border-radius: 8px;
        font-size: 10px; background: #a878d5; color: #16130f; font-weight: 600;
      }
      .log-badge.none { background: #d5b45b; }
      #logLatest {
        display: inline-block; max-width: 190px; overflow: hidden;
        text-overflow: ellipsis; white-space: nowrap; vertical-align: bottom;
        font-weight: 400; color: #cbbfa8;
      }
      .hud-help {
        left: 50%; bottom: 12px; transform: translateX(-50%);
        color: #cbbfa8; font-size: 11px; padding: 6px 14px; white-space: nowrap;
      }
      kbd {
        background: #2c2519; border: 1px solid #4a3d2b; border-bottom-width: 2px;
        border-radius: 5px; padding: 1px 6px; font-size: 11px; color: #f0d9a8;
      }
      /* 증거 노트 (개인 메모) */
      .evi-group { margin-bottom: 8px; }
      .evi-group .cat { font-size: 10px; color: #a89778; margin-bottom: 4px; }
      /* 규칙적인 그리드 배치 (탐정 수첩 느낌) */
      .evi-chips { display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px; }
      .evi-chip {
        display: flex; align-items: center; gap: 4px; min-width: 0;
        padding: 4px 7px; border-radius: 6px; cursor: pointer;
        background: #16130f; border: 1px solid #3a3126;
        font-size: 11px; color: #cbbfa8; user-select: none;
        white-space: nowrap; overflow: hidden;
      }
      .evi-chip > span:last-child { overflow: hidden; text-overflow: ellipsis; }
      .evi-chip:hover { border-color: #b4622b; }
      .evi-chip.cleared { opacity: 0.4; text-decoration: line-through; }
      .evi-chip.suspect { background: #3a2b1a; border-color: #e0a35a; color: #f0d9a8; }
      .evi-chip.own { cursor: default; opacity: 0.5; border-style: dashed; }
      .evi-chip.own:hover { border-color: #3a3126; }

      /* 반응형: 좁은 화면에서 HUD 축소·모서리 정리 */
      @media (max-width: 680px) {
        .hud { font-size: 11px; padding: 8px 10px; }
        .hud-ctrl { left: 8px; top: 8px; gap: 6px; padding: 6px; }
        .hud-ctrl button { padding: 6px 8px; }
        .hud-hand { left: 8px; bottom: 8px; max-width: 46vw; }
        .hud-evi { right: 8px; top: 8px; width: 46vw; max-height: 40vh; }
        .hud-log { right: 8px; bottom: 8px; width: 46vw; }
        #log { height: 84px; }
        .hud-help { display: none; }
      }
      @media (max-width: 420px) {
        .hud-hand, .hud-evi, .hud-log { max-width: 92vw; width: auto; }
        .hud-hand { right: 8px; }
      }

      /* ── 카드 선택 모달 ── */
      .overlay {
        position: fixed; inset: 0; background: rgba(0, 0, 0, 0.6);
        display: flex; align-items: center; justify-content: center; z-index: 10;
      }
      .modal {
        background: #221c15; border: 1px solid #4a3d2b; border-radius: 10px;
        padding: 20px; width: 300px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      }
      .modal h2 { font-size: 15px; margin: 0 0 14px; color: #f0d9a8; }
      .modal-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
      .modal-row label { width: 52px; font-size: 12px; color: #a89778; }
      .modal select {
        flex: 1; background: #16130f; color: #f0e9dc; border: 1px solid #4a3d2b;
        border-radius: 6px; padding: 6px 8px; font-size: 13px;
      }
      .modal .actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
      .modal .ghost { background: #3a3126; }
      .modal .ghost:hover { background: #493d2d; }
    </style>
  </head>
  <body>
    <!-- ① 랜딩 -->
    <section id="landing" class="center">
      <div class="card">
        <h1>🐯 호랑이 생신 잔치</h1>
        <p class="subtitle">대감집 손님들 중 잔치 선물을 훔친 자를 추리하라</p>
        <div class="field">
          <label>캐릭터 선택 (선택 사항 · 대기실에서 변경 가능)</label>
          <div id="charGrid" class="char-grid"></div>
        </div>
        <div id="personaPanel" class="persona">
          캐릭터에 마우스를 올리면 <b>성격</b>이 표시됩니다. 이 성격은 NPC 대사에도 반영돼요.
        </div>
        <button id="createBtn" class="full">방 만들기</button>
        <div class="divider">— 또는 초대받았다면 —</div>
        <div class="join-row">
          <input id="codeInput" placeholder="초대 코드" />
          <button id="joinBtn">참가</button>
        </div>
        <div id="landingMsg" class="msg"></div>
      </div>
    </section>

    <!-- ② 대기실(로비) -->
    <section id="lobby" class="center hidden">
      <div class="card">
        <h1>🏮 대기실</h1>
        <p class="subtitle">초대 링크를 친구에게 공유하세요</p>
        <div class="invite">
          <input id="inviteLink" readonly />
          <button id="copyBtn">복사</button>
        </div>
        <div style="font-size: 12px; color: #a89778;">
          참가자 (<span id="playerCount">0</span>/6)
        </div>
        <ul id="playerList"></ul>
        <div style="font-size: 12px; color: #a89778; margin-bottom: 4px;">
          내 캐릭터 (선택됨 🟡 / 사용중 🔒)
        </div>
        <div id="lobbyChars" class="char-grid" style="margin-bottom: 16px;"></div>
        <button id="startBtn" class="full" disabled>잔치 시작</button>
        <div id="hostHint" class="host-hint"></div>
      </div>
    </section>

    <!-- ③ 게임 (풀스크린 보드 + 플로팅 HUD) -->
    <section id="gameScreen" class="hidden">
      <div id="game"></div>

      <div class="hud hud-ctrl">
        <button id="suggest">제안</button>
        <button id="accuse">고발</button>
        <button id="endTurn">턴 종료</button>
      </div>

      <div class="hud hud-turn hidden" id="turnInfo"></div>

      <div class="hud hud-spectate hidden" id="spectateBar">
        ❌ 탈락 · 관전 중 <button id="specHome">메인으로</button>
      </div>

      <div id="diceOverlay" class="dice-overlay hidden"></div>

      <div id="endOverlay" class="end-overlay hidden">
        <div class="end-card">
          <div id="endTitle" class="end-title"></div>
          <div id="endSub" class="end-sub"></div>
          <button id="endHome" class="end-btn">메인으로</button>
        </div>
      </div>

      <!-- 우측 컬럼: 증거노트(위) + 기록(아래). 좌측 모서리 드래그=너비, 사이 드래그=높이 -->
      <div class="rp-col" id="rightPanel">
        <div class="rp-wresizer" id="colWResizer" title="드래그로 너비 조절"></div>
        <div class="rp-panel rp-evi" id="eviPanel">
          <div class="rp-head">🔍 증거 노트 <span class="rp-sub">(나만 봄)</span></div>
          <div id="evidence" class="rp-body"></div>
        </div>
        <div class="rp-hresizer" id="colResizer" title="드래그로 높이 조절"></div>
        <div class="rp-panel rp-log" id="logPanel">
          <div class="rp-head">📜 기록 / 알림</div>
          <div id="log" class="rp-body"></div>
        </div>
      </div>

      <div class="hud hud-hand">
        <div id="hand"><b>내 단서 패</b>: (잔치 시작 후 표시)</div>
      </div>

      <div class="hud hud-help">
        이동 <kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> · 줌 <kbd>휠</kbd> · 자유시점 <kbd>Space</kbd>(꾹) · 방에서 [제안]
      </div>
    </section>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
