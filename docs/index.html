<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>zodiac-clue 문서</title>
<style>
  :root { --bg:#16130f; --panel:#1a1611; --card:#211c16; --edge:#3a3126; --ink:#f0e9dc; --dim:#a89778; --gold:#f0d9a8; --accent:#b4622b; }
  * { box-sizing: border-box; }
  html, body { height:100%; }
  body { margin:0; background:var(--bg); color:var(--ink); display:flex; overflow:hidden;
    font-family: system-ui,-apple-system,"Apple SD Gothic Neo",sans-serif; line-height:1.7; }
  a { color:#e0a35a; }

  /* ── 좌측 트리 ── */
  .sidebar { width:300px; flex:none; background:var(--panel); border-right:1px solid var(--edge);
    overflow-y:auto; display:flex; flex-direction:column; }
  .side-head { padding:16px 16px 10px; border-bottom:1px solid var(--edge); }
  .side-head .brand { color:var(--gold); font-weight:700; font-size:15px; }
  .side-head .links { margin-top:8px; font-size:12px; display:flex; flex-wrap:wrap; gap:8px; }
  .side-head .links a { color:var(--dim); text-decoration:none; }
  .side-head .links a:hover { color:#e0a35a; }
  nav#tree { padding:8px 6px 24px; }
  nav#tree details { margin:2px 0; }
  nav#tree summary { cursor:pointer; list-style:none; padding:6px 10px; font-size:12px; color:var(--gold);
    letter-spacing:.3px; border-radius:6px; user-select:none; }
  nav#tree summary::-webkit-details-marker { display:none; }
  nav#tree summary::before { content:"▾ "; color:var(--dim); }
  nav#tree details:not([open]) summary::before { content:"▸ "; }
  nav#tree summary:hover { background:#221c15; }
  nav#tree a.doc { display:block; padding:6px 10px 6px 26px; font-size:13px; color:#cbbfa8;
    text-decoration:none; border-radius:6px; border-left:2px solid transparent; }
  nav#tree a.doc:hover { background:#221c15; color:var(--ink); }
  nav#tree a.doc.active { background:#2c2317; color:var(--gold); border-left-color:var(--accent); }

  /* ── 본문 ── */
  .main { flex:1; min-width:0; display:flex; flex-direction:column; }
  .topbar { flex:none; display:flex; align-items:center; gap:12px; padding:10px 18px;
    background:rgba(22,19,15,0.92); backdrop-filter:blur(4px); border-bottom:1px solid var(--edge); }
  .topbar button { background:#2c2519; color:var(--ink); border:1px solid var(--edge); border-radius:6px;
    padding:6px 12px; font-size:13px; cursor:pointer; }
  .topbar button:hover { background:#3a3126; }
  .topbar .crumb { flex:1; color:var(--dim); font-size:13px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .topbar a.raw { color:var(--dim); font-size:12px; text-decoration:none; }
  .topbar .hamburger { display:none; }
  .scroll { flex:1; overflow:auto; }
  iframe.docframe { width:100%; height:100%; border:0; background:var(--bg); }

  /* 마크다운 렌더 톤 */
  .wrap { max-width:900px; margin:0 auto; padding:26px 24px 80px; }
  .md h1 { color:var(--gold); font-size:25px; margin:22px 0 8px; }
  .md h2 { color:var(--gold); font-size:19px; margin:30px 0 10px; border-bottom:1px solid var(--edge); padding-bottom:6px; }
  .md h3 { font-size:15px; margin:18px 0 6px; }
  .md p, .md li { font-size:14px; }
  .md strong { color:var(--gold); }
  .md code { background:#2c2519; border:1px solid var(--edge); border-radius:4px; padding:1px 5px; font-size:13px; }
  .md pre { background:#0f0d0a; border:1px solid var(--edge); border-radius:8px; padding:12px 14px; overflow-x:auto; }
  .md pre code { background:none; border:0; padding:0; font-size:13px; line-height:1.5; }
  .md blockquote { margin:12px 0; padding:8px 14px; border-left:3px solid var(--accent); background:#2b2013;
    border-radius:0 8px 8px 0; color:var(--dim); font-size:13px; }
  .md hr { border:0; border-top:1px solid var(--edge); margin:22px 0; }
  .md ul, .md ol { padding-left:22px; }
  .md li { margin:2px 0; }
  .md table { width:100%; border-collapse:collapse; margin:14px 0; font-size:13px; display:block; overflow-x:auto; }
  .md th, .md td { border:1px solid var(--edge); padding:8px 10px; text-align:left; vertical-align:top; }
  .md th { background:#2c2519; color:var(--gold); }
  .md .chk { display:inline-block; width:1.2em; }
  .md .chk-done { color:#7ee29a; } .md .chk-todo { color:var(--dim); } .md .chk-part { color:#e0c25a; }

  /* 개요(홈) */
  .home-card { background:var(--card); border:1px solid var(--edge); border-radius:12px; padding:24px 26px; }
  .home-card h1 { color:var(--gold); margin:0 0 6px; font-size:24px; }
  .home-card p { font-size:14px; color:var(--dim); }
  .live { display:inline-block; margin-top:8px; }

  @media (max-width:760px) {
    .sidebar { position:fixed; left:0; top:0; bottom:0; z-index:30; transform:translateX(-100%);
      transition:transform .2s; box-shadow:8px 0 30px rgba(0,0,0,.5); }
    .sidebar.open { transform:none; }
    .topbar .hamburger { display:inline-block; }
    .backdrop { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:25; }
    .backdrop.show { display:block; }
  }
</style>
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="side-head">
      <div class="brand">🐯 zodiac-clue 문서</div>
      <div class="links">
        <a href="https://zodiac-clue.vercel.app" target="_blank">🎮 라이브</a>
        <a href="https://github.com/anveloper/zodiac-clue" target="_blank">GitHub</a>
      </div>
    </div>
    <nav id="tree"></nav>
  </aside>
  <div class="backdrop" id="backdrop"></div>

  <div class="main">
    <div class="topbar">
      <button class="hamburger" id="hamburger">☰</button>
      <button id="backList">← 목록</button>
      <span class="crumb" id="crumb">문서 대시보드</span>
      <a class="raw" id="rawLink" href="#" target="_blank" style="display:none">원문 ↗</a>
    </div>
    <div class="scroll" id="scroll">
      <div class="wrap" id="content"></div>
    </div>
  </div>

<script>
  const $ = (id) => document.getElementById(id);
  const esc = (s) => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const inline = (s) => s
    .replace(/`([^`]+)`/g,(_m,c)=>`<code>${c}</code>`)
    .replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>")
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');
  const checkbox = (h) => h
    .replace(/^\[( )\]\s*/,'<span class="chk chk-todo">☐</span> ')
    .replace(/^\[([xX])\]\s*/,'<span class="chk chk-done">☑</span> ')
    .replace(/^\[~\]\s*/,'<span class="chk chk-part">◐</span> ')
    .replace(/^\[→\]\s*/,'<span class="chk">→</span> ');

  function mdToHtml(md){
    const blk=[];
    md=md.replace(/```([\s\S]*?)```/g,(_m,c)=>{blk.push(c.replace(/^\n/,"").replace(/\n$/,""));return ` CODE${blk.length-1} `;});
    const L=md.split("\n"); let out="",i=0,lt=null;
    const cl=()=>{if(lt){out+=`</${lt}>`;lt=null;}};
    while(i<L.length){
      const ln=L[i];
      const cm=ln.match(/^ CODE(\d+) $/);
      if(cm){cl();out+=`<pre><code>${esc(blk[+cm[1]])}</code></pre>`;i++;continue;}
      if(/^\s*$/.test(ln)){cl();i++;continue;}
      if(/^---+$/.test(ln.trim())){cl();out+="<hr>";i++;continue;}
      const h=ln.match(/^(#{1,4})\s+(.*)$/);
      if(h){cl();out+=`<h${h[1].length}>${inline(esc(h[2]))}</h${h[1].length}>`;i++;continue;}
      if(/^>\s?/.test(ln)){cl();let b="";while(i<L.length&&/^>\s?/.test(L[i])){b+=inline(esc(L[i].replace(/^>\s?/,"")))+"<br>";i++;}out+=`<blockquote>${b}</blockquote>`;continue;}
      if(ln.includes("|")&&i+1<L.length&&/^[\s|:-]+$/.test(L[i+1])&&L[i+1].includes("-")){
        const row=(r)=>r.trim().replace(/^\|/,"").replace(/\|$/,"").split("|").map(c=>c.trim());
        const hd=row(ln);i+=2;
        let t=`<table><thead><tr>${hd.map(x=>`<th>${inline(esc(x))}</th>`).join("")}</tr></thead><tbody>`;
        while(i<L.length&&L[i].includes("|")){t+=`<tr>${row(L[i]).map(c=>`<td>${inline(esc(c))}</td>`).join("")}</tr>`;i++;}
        out+=t+"</tbody></table>";continue;
      }
      const li=ln.match(/^(\s*)([-*]|\d+\.)\s+(.*)$/);
      if(li){const want=/\d+\./.test(li[2])?"ol":"ul";if(lt!==want){cl();lt=want;out+=`<${want}>`;}out+=`<li>${checkbox(inline(esc(li[3])))}</li>`;i++;continue;}
      cl();out+=`<p>${inline(esc(ln))}</p>`;i++;
    }
    cl();return out;
  }

  let manifest=[];
  const flat=()=>manifest.flatMap(g=>g.items);

  function buildTree(){
    const tree=$("tree"); tree.innerHTML="";
    for(const g of manifest){
      const d=document.createElement("details"); d.open=true;
      const s=document.createElement("summary"); s.textContent=g.label; d.appendChild(s);
      for(const it of g.items){
        const a=document.createElement("a"); a.className="doc"; a.href="#"+it.path;
        a.dataset.path=it.path; a.textContent=it.title;
        d.appendChild(a);
      }
      tree.appendChild(d);
    }
  }

  function setActive(path){
    document.querySelectorAll("nav#tree a.doc").forEach(a=>a.classList.toggle("active",a.dataset.path===path));
  }

  function showHome(){
    setActive(null); $("crumb").textContent="문서 대시보드"; $("rawLink").style.display="none";
    const total=flat().length;
    $("content").innerHTML=`<div class="home-card">
      <h1>🐯 zodiac-clue 문서</h1>
      <p>호랑이 생신 잔치 · 웹 멀티 추리 게임. 왼쪽 트리에서 설계·플랜·개발일지를 골라 보세요. (총 ${total}개)</p>
      <p class="live">🎮 라이브: <a href="https://zodiac-clue.vercel.app" target="_blank">zodiac-clue.vercel.app</a></p>
      <p><b>문서 규칙</b>: <code>plans/</code>=AI용 압축 .md · 그 외=사람용 .md+.html(수기 디자인). 이 뷰어는 .md를 같은 톤으로 렌더, .html은 원본 표시.</p>
    </div>`;
    $("scroll").scrollTop=0;
  }

  async function openDoc(path){
    const item=flat().find(x=>x.path===path);
    if(!item){ showHome(); return; }
    setActive(path); $("crumb").textContent=item.title;
    $("rawLink").href="./"+path; $("rawLink").style.display="";
    const content=$("content");
    if(path.endsWith(".html")){
      // 이미 디자인된 페이지 → iframe으로 프레임 유지하며 표시
      content.innerHTML=`<iframe class="docframe" src="./${path}"></iframe>`;
      // iframe이 스크롤 영역을 꽉 채우도록 wrap 패딩 제거
      content.style.maxWidth="none"; content.style.padding="0";
      $("scroll").style.overflow="hidden";
      content.querySelector("iframe").style.height=$("scroll").clientHeight+"px";
    } else {
      content.style.maxWidth=""; content.style.padding=""; $("scroll").style.overflow="auto";
      content.className="wrap md"; content.innerHTML="불러오는 중…";
      try{
        const r=await fetch("./"+path,{cache:"no-cache"}); if(!r.ok)throw new Error("HTTP "+r.status);
        content.innerHTML=mdToHtml(await r.text());
      }catch(e){ content.innerHTML=`<p style="color:#e0736b">문서를 불러오지 못했습니다: ${e.message}</p>`; }
      $("scroll").scrollTop=0;
    }
    // 모바일: 선택 시 사이드바 닫기
    closeSidebar();
  }

  function route(){
    const path=decodeURIComponent(location.hash.replace(/^#/,""));
    if(path) openDoc(path); else showHome();
  }

  // 모바일 사이드바
  const openSidebar=()=>{ $("sidebar").classList.add("open"); $("backdrop").classList.add("show"); };
  const closeSidebar=()=>{ $("sidebar").classList.remove("open"); $("backdrop").classList.remove("show"); };
  $("hamburger").onclick=openSidebar;
  $("backdrop").onclick=closeSidebar;
  $("backList").onclick=()=>{ if(window.innerWidth<=760){ openSidebar(); } location.hash=""; showHome(); };

  (async()=>{
    try{ manifest=await (await fetch("./manifest.json",{cache:"no-cache"})).json(); }
    catch{ manifest=[]; }
    buildTree(); route();
    window.addEventListener("hashchange",route);
  })();
</script>
</body>
</html>
